name: Security - Vulnerability Scanning
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2 AM UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  ##############################################################################
  # NPM AUDIT
  ##############################################################################
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run npm Audit
        continue-on-error: true
        run: |
          npm audit --audit-level=high 2>&1 | tee reports/npm-audit.txt
      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: reports/npm-audit.txt
          retention-days: 30

  ##############################################################################
  # SECRET SCANNING
  ##############################################################################
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for Secrets
        uses: trufflesecurity/trufflehog@v3
        with:
          extra_args: --only-verified --results=verified,unknown

  ##############################################################################
  # GITLEAKS
  ##############################################################################
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ##############################################################################
  # CODEQL ANALYSIS
  ##############################################################################
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript", "typescript"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  ##############################################################################
  # ENVIRONMENT VARIABLE VALIDATION
  ##############################################################################
  env-validation:
    name: Env Variable Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Environment Variables
        run: |
          REQUIRED_VARS="DATABASE_URL NEXTAUTH_SECRET"
          MISSING=0
          for var in $REQUIRED_VARS; do
            if [ -z "${!var}" ]; then
              echo "⚠️  $var is not set (expected in production)"
              # Not failing because CI uses defaults
            fi
          done
          echo "✅ Environment variable validation complete"

  ##############################################################################
  # DEPENDENCY CHECK
  ##############################################################################
  dependency-check:
    name: Dependency Security Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: "AGPL-1.0, AGPL-3.0"
          allow-licenses: "MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, Unlicense, 0BSD, MPL-2.0"

  ##############################################################################
  # SUMMARY
  ##############################################################################
  summary:
    name: Security Scan Summary
    if: always()
    needs: [npm-audit, gitleaks, codeql, dependency-check]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate Security Results
        run: |
          echo "📊 Security Scan Results:"
          echo "  npm Audit: ${{ needs.npm-audit.result }}"
          echo "  Gitleaks: ${{ needs.gitleaks.result }}"
          echo "  CodeQL: ${{ needs.codeql.result }}"
          echo "  Dependency Review: ${{ needs.dependency-check.result }}"
          echo "✅ Security scan completed"
