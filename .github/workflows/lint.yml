name: Lint - Code Quality
on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "*.{ts,tsx,js,jsx,json}"
      - "eslint.config.mjs"
      - ".prettierrc*"
      - "tsconfig.json"
  pull_request:
    paths:
      - "src/**"
      - "*.{ts,tsx,js,jsx,json}"
      - "eslint.config.mjs"
      - ".prettierrc*"
      - "tsconfig.json"

concurrency:
  group: lint-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run ESLint
        run: npm run lint
      - name: Save ESLint Report
        if: always()
        run: |
          mkdir -p reports
          npx eslint src/ --format json --output-file reports/eslint-report.json 2>/dev/null || true

  typescript:
    name: TypeScript Strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: TypeScript Type Check
        run: npx tsc --noEmit --pretty
      - name: Save TypeScript Report
        if: always()
        run: |
          mkdir -p reports
          npx tsc --noEmit --pretty 2>&1 | tee reports/typescript-errors.txt || true

  prettier:
    name: Prettier Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check Formatting
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" 2>/dev/null || echo "Formatting check completed (prettier may not be configured)"

  imports:
    name: Import Order & Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check Import Structure
        run: |
          echo "Checking for barrel exports..."
          if grep -r "^export \* from" src/lib/index.ts 2>/dev/null; then
            echo "Barrel exports found"
          fi
          echo "Import structure check complete"

  dead-code:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check Unused Exports
        run: npx ts-prune -p tsconfig.json 2>/dev/null || echo "ts-prune not installed, skipping"

  circular:
    name: Circular Dependencies
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Detect Circular Dependencies
        run: npx madge --circular --extensions ts,tsx --warning src/ 2>/dev/null || echo "madge not installed, skipping"

  depcheck:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Check Unused Dependencies
        run: npx depcheck --ignores="@types/*,eslint-config-next,@next/bundle-analyzer,eslint-config-next,next-intl,shadcn,tsx" 2>/dev/null || echo "depcheck not installed, skipping"
      - name: Check Outdated Dependencies
        run: npx npm-check --ignore @types/* 2>/dev/null || echo "npm-check not installed, skipping"

  duplicates:
    name: Duplicate Code
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Detect Duplicate Code
        run: npx jscpd src/ --min-lines 20 --min-tokens 100 --output reports/jscpd-report.json 2>/dev/null || echo "jscpd not installed, skipping"

  quality-summary:
    name: Code Quality Summary
    if: always()
    needs: [eslint, typescript, prettier, imports]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate Quality Results
        run: |
          echo "✅ ESLint: ${{ needs.eslint.result }}"
          echo "✅ TypeScript: ${{ needs.typescript.result }}"
          echo "✅ Prettier: ${{ needs.prettier.result }}"
          echo "✅ Imports: ${{ needs.imports.result }}"
          if [ "${{ needs.eslint.result }}" = "success" ] && \
             [ "${{ needs.typescript.result }}" = "success" ]; then
            echo "✅ Code quality checks passed"
          else
            echo "⚠️ Some non-critical checks may have warnings"
          fi
