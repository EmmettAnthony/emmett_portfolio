name: Deploy - Vercel Deployment
on:
  push:
    branches: [main, develop]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
      commit-sha:
        description: "Commit SHA to deploy (leave empty for latest)"
        required: false
        default: ""
      rollback:
        description: "Rollback to previous deployment"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-${{ github.ref_name }}-${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'preview') }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  ##############################################################################
  # VERIFICATION — run checks before deploying
  ##############################################################################
  verify:
    name: Pre-Deploy Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit-sha || github.sha }}
      - uses: ./.github/actions/setup
      - name: TypeScript Check
        run: npx tsc --noEmit
      - name: Lint Check
        run: npm run lint
      - name: Unit Tests
        run: npx vitest run tests/unit/ tests/component/ tests/api/ tests/server-actions/ tests/auth/ tests/security/ tests/error-handling/ tests/activity-log/ --reporter=junit --outputFile=reports/junit-pre-deploy.xml
      - name: Build Check
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ github.ref_name == 'main' && 'https://emmettanthony.dev' || 'https://preview.emmettanthony.dev' }}
      - uses: ./.github/actions/test-reporter

  ##############################################################################
  # VERCEL DEPLOYMENT
  ##############################################################################
  vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [verify]
    timeout-minutes: 15
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview-url }}
      deployment-url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit-sha || github.sha }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "release" ] || [ "${{ github.event.inputs.environment }}" = "production" ] || [ "${{ github.ref_name }}" = "main" ]; then
            echo "scope=production" >> $GITHUB_OUTPUT
          else
            echo "scope=preview" >> $GITHUB_OUTPUT
          fi

      - name: Pull Vercel Environment
        run: |
          vercel pull \
            --yes \
            --environment=${{ steps.env.outputs.scope }} \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: |
          vercel build \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --${{ steps.env.outputs.scope }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          if [ "${{ steps.env.outputs.scope }}" = "production" ]; then
            DEPLOY_URL=$(vercel deploy \
              --prebuilt \
              --prod \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --archive=tgz)
          else
            DEPLOY_URL=$(vercel deploy \
              --prebuilt \
              --token=${{ secrets.VERCEL_TOKEN }} \
              --archive=tgz)
          fi
          echo "deployment-url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $DEPLOY_URL"

      - name: Run Smoke Tests
        if: steps.env.outputs.scope == 'production'
        run: |
          echo "Running smoke tests against ${{ steps.deploy.outputs.deployment-url }}"
          curl -sSf -o /dev/null -w "%{http_code}" "${{ steps.deploy.outputs.deployment-url }}" || echo "⚠️ Smoke test failed — deployment may still be propagating"

      - name: Comment Deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview Deployment**: ${{ steps.deploy.outputs.deployment-url }}\n\n✅ All checks passed — deployment is ready for review.`
            })

  ##############################################################################
  # POST-DEPLOYMENT
  ##############################################################################
  post-deploy:
    name: Post-Deployment
    runs-on: ubuntu-latest
    needs: [verify, vercel]
    if: success()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" > deploy-report.md
          echo "" >> deploy-report.md
          echo "### Details" >> deploy-report.md
          echo "- **Environment**: ${{ needs.vercel.outputs.deployment-url }}" >> deploy-report.md
          echo "- **Commit**: ${{ github.sha }}" >> deploy-report.md
          echo "- **Branch**: ${{ github.ref_name }}" >> deploy-report.md
          echo "- **Trigger**: ${{ github.event_name }}" >> deploy-report.md
          echo "" >> deploy-report.md
          echo "### Checks" >> deploy-report.md
          echo "- ✅ TypeScript: Passed" >> deploy-report.md
          echo "- ✅ Lint: Passed" >> deploy-report.md
          echo "- ✅ Tests: Passed" >> deploy-report.md
          echo "- ✅ Build: Passed" >> deploy-report.md
          echo "- ✅ Deploy: Passed" >> deploy-report.md
          cat deploy-report.md

  ##############################################################################
  # ROLLBACK (manual trigger)
  ##############################################################################
  rollback:
    name: Rollback Deployment
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: List Recent Deployments
        run: |
          vercel list \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --limit=10

      - name: Rollback to Previous
        run: |
          echo "⚠️ Initiating rollback..."
          # Get the second-to-last production deployment
          PREVIOUS=$(vercel list --prod --token=${{ secrets.VERCEL_TOKEN }} | \
            grep -v "Current" | \
            sed -n '3p' | \
            awk '{print $1}')
          if [ -n "$PREVIOUS" ]; then
            vercel promote "$PREVIOUS" --token=${{ secrets.VERCEL_TOKEN }}
            echo "✅ Rolled back to $PREVIOUS"
          else
            echo "❌ No previous deployment found"
            exit 1
          fi

  ##############################################################################
  # VERIFY DEPLOYMENT
  ##############################################################################
  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [vercel]
    if: success()
    timeout-minutes: 5
    steps:
      - name: Wait for Propagation
        run: sleep 30

      - name: Check Deployment Health
        run: |
          URL="${{ needs.vercel.outputs.deployment-url }}"
          echo "Checking health at $URL"
          STATUS=$(curl -sSf -o /dev/null -w "%{http_code}" "$URL" 2>/dev/null || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment is healthy (HTTP $STATUS)"
          else
            echo "⚠️ Deployment health check returned HTTP $STATUS"
          fi

      - name: Verify Critical Pages
        run: |
          URL="${{ needs.vercel.outputs.deployment-url }}"
          PAGES=("/" "/about" "/portfolio" "/services" "/blog" "/contact")
          FAILURES=0
          for page in "${PAGES[@]}"; do
            STATUS=$(curl -sSf -o /dev/null -w "%{http_code}" "$URL$page" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "308" ]; then
              echo "✅ $page — $STATUS"
            else
              echo "❌ $page — $STATUS"
              FAILURES=$((FAILURES + 1))
            fi
          done
          if [ $FAILURES -gt 0 ]; then
            echo "⚠️ $FAILURES pages returned unexpected status"
          fi
