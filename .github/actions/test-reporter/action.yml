name: "Test Reporter"
description: "Consolidate and upload test artifacts and reports"

inputs:
  coverage:
    description: "Upload coverage report"
    required: false
    default: "true"
  playwright:
    description: "Upload Playwright report"
    required: false
    default: "false"
  lighthouse:
    description: "Upload Lighthouse report"
    required: false
    default: "false"
  junit:
    description: "Upload JUnit XML reports"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Create reports directory
      shell: bash
      run: mkdir -p reports

    - name: Upload Coverage Report
      if: inputs.coverage == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 14
        compression-level: 6

    - name: Upload JUnit Reports
      if: inputs.junit == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: junit-reports
        path: reports/*.xml
        retention-days: 14
        compression-level: 6

    - name: Upload Playwright Report
      if: inputs.playwright == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
        compression-level: 6

    - name: Upload Lighthouse Report
      if: inputs.lighthouse == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: lighthouse-report
        path: lighthouse-report/
        retention-days: 30
        compression-level: 6

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          .next/build-manifest.json
          .next/build-id
        retention-days: 7
        compression-level: 6
