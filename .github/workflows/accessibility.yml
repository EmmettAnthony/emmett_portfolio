name: Accessibility - WCAG Compliance
on:
  push:
    branches: [main]
    paths:
      - "src/components/**"
      - "src/app/**"
  pull_request:
    branches: [main]
    paths:
      - "src/components/**"
      - "src/app/**"
  schedule:
    - cron: "0 4 * * 1" # Every Monday at 4 AM UTC
  workflow_dispatch:

concurrency:
  group: a11y-${{ github.ref_name }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  ##############################################################################
  # AXE-CORE ACCESSIBILITY TESTS
  ##############################################################################
  axe-tests:
    name: axe-core Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run Accessibility Tests
        run: npx vitest run tests/accessibility/ --reporter=junit --outputFile=reports/junit-a11y.xml
      - uses: ./.github/actions/test-reporter
        with:
          coverage: "false"
          lighthouse: "false"

  ##############################################################################
  # PLAYWRIGHT ACCESSIBILITY AUDIT
  ##############################################################################
  playwright-a11y:
    name: Playwright A11y Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          install-playwright: "true"
          playwright-browsers: "chromium"
      - name: Build Application
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      - name: Start Server
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 30000
      - name: Run A11y Scans
        run: |
          mkdir -p a11y-reports
          PAGES=("/" "/about" "/portfolio" "/services" "/blog" "/contact" "/resume" "/admin/login" "/book" "/support")
          for page in "${PAGES[@]}"; do
            name=$(echo "$page" | tr '/' '_' | sed 's/^_//' || echo "home")
            echo "🔍 Scanning: $page"
            npx playwright test --grep "@a11y" 2>/dev/null || true
          done
      - name: Stop Server
        if: always()
        run: kill $(lsof -t -i:3000) 2>/dev/null || true

  ##############################################################################
  # WCAG VALIDATION
  ##############################################################################
  wcag-validation:
    name: WCAG Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check ARIA Attributes
        run: |
          echo "## ♿ WCAG Compliance Check" > a11y-report.md
          echo "" >> a11y-report.md
          echo "### ARIA Attribute Check" >> a11y-report.md
          echo 'Checking for common ARIA issues...' >> a11y-report.md
          if grep -r "aria-label=\"\"" src/components/ --include="*.tsx" 2>/dev/null; then
            echo "⚠️ Found empty aria-labels" >> a11y-report.md
          else
            echo "✅ No empty aria-labels found" >> a11y-report.md
          fi
          if grep -r "role=" src/components/ --include="*.tsx" 2>/dev/null | head -20; then
            echo "✅ ARIA roles found in components" >> a11y-report.md
          fi
          echo "" >> a11y-report.md
          echo "### Alt Text Check" >> a11y-report.md
          if grep -r "alt={\"\"}" src/components/ --include="*.tsx" 2>/dev/null; then
            echo "⚠️ Found decorative images without proper alt text" >> a11y-report.md
          fi
          cat a11y-report.md

  ##############################################################################
  # KEYBOARD NAVIGATION
  ##############################################################################
  keyboard-nav:
    name: Keyboard Navigation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Keyboard Accessibility
        run: |
          echo "## ⌨️ Keyboard Navigation Check" >> a11y-report.md
          echo "" >> a11y-report.md
          echo "Checking for keyboard accessibility patterns..." >> a11y-report.md
          if grep -r "onKeyDown\|onKeyPress\|tabIndex" src/components/ --include="*.tsx" 2>/dev/null | head -20; then
            echo "✅ Keyboard event handlers found" >> a11y-report.md
          fi
          echo "" >> a11y-report.md
          echo "### Focus Management" >> a11y-report.md
          if grep -r "focus\|useRef" src/components/ui/ --include="*.tsx" 2>/dev/null | head -10; then
            echo "✅ Focus management patterns found" >> a11y-report.md
          fi
          cat a11y-report.md

  ##############################################################################
  # COLOR CONTRAST
  ##############################################################################
  color-contrast:
    name: Color Contrast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Color Contrast
        run: |
          echo "## 🎨 Color Contrast Check" >> a11y-report.md
          echo "" >> a11y-report.md
          echo "Checking Tailwind config for accessible colors..." >> a11y-report.md
          if [ -f "tailwind.config.ts" ] || [ -f "tailwind.config.js" ]; then
            echo "✅ Tailwind config found" >> a11y-report.md
          fi
          cat a11y-report.md

  ##############################################################################
  # SUMMARY
  ##############################################################################
  summary:
    name: Accessibility Summary
    if: always()
    needs: [axe-tests, playwright-a11y, wcag-validation, keyboard-nav, color-contrast]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate A11y Results
        run: |
          echo "📊 Accessibility Results:"
          echo "  axe-core Tests: ${{ needs.axe-tests.result }}"
          echo "  Playwright A11y: ${{ needs.playwright-a11y.result }}"
          echo "  WCAG Validation: ${{ needs.wcag-validation.result }}"
          echo "  Keyboard Nav: ${{ needs.keyboard-nav.result }}"
          echo "  Color Contrast: ${{ needs.color-contrast.result }}"
          echo "✅ Accessibility checks completed"
