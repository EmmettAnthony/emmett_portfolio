<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="200" cy="185" r="120"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#F8FAFC" rx="32"/>
  <!-- Subtle background pattern -->
  <circle cx="350" cy="50" r="180" fill="#3B82F6" opacity="0.03"/>
  <circle cx="50" cy="350" r="160" fill="#8B5CF6" opacity="0.03"/>
  <!-- Avatar circle background -->
  <circle cx="200" cy="185" r="130" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.3"/>
  <circle cx="200" cy="185" r="120" fill="url(#bg)" opacity="0.95"/>
  <!-- Person silhouette -->
  <ellipse cx="200" cy="155" rx="40" ry="42" fill="white" opacity="0.9"/>
  <path d="M125 280 Q130 230 200 225 Q270 230 275 280" fill="white" opacity="0.9"/>
  <!-- Name initials badge -->
  <rect x="145" y="290" width="110" height="36" rx="18" fill="white" opacity="0.95"/>
  <text x="200" y="315" text-anchor="middle" fill="#3B82F6" font-size="14" font-weight="bold" font-family="system-ui">EA</text>
  <!-- Decorative dots -->
  <circle cx="120" cy="100" r="4" fill="#3B82F6" opacity="0.2"/>
  <circle cx="285" cy="90" r="3" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="300" cy="280" r="5" fill="#3B82F6" opacity="0.15"/>
  <circle cx="100" cy="270" r="3" fill="#8B5CF6" opacity="0.15"/>
</svg>
