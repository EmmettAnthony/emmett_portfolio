name: Release - Version & Release Management
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
  workflow_dispatch:
    inputs:
      version-bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      release-notes:
        description: "Custom release notes"
        required: false
        default: ""
      pre-release:
        description: "Mark as pre-release"
        type: boolean
        default: false

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"

jobs:
  ##############################################################################
  # VERSION BUMP
  ##############################################################################
  version:
    name: Bump Version
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -ra PARTS <<< "$CURRENT"
          MAJOR=${PARTS[0]}
          MINOR=${PARTS[1]}
          PATCH=${PARTS[2]}

          case "${{ github.event.inputs.version-bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          npm version $NEW_VERSION --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to v$NEW_VERSION"
          git push origin main

  ##############################################################################
  # CHANGELOG GENERATION
  ##############################################################################
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: [version]
    outputs:
      changelog: ${{ steps.gen-changelog.outputs.changelog }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        id: gen-changelog
        run: |
          CHANGELOG="## What's Changed\n\n"
          CHANGELOG="$CHANGELOG### Features\n"
          CHANGELOG="$CHANGELOG$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline --grep='feat:' | sed 's/^/- /' || echo 'None')\n\n"
          CHANGELOG="$CHANGELOG### Bug Fixes\n"
          CHANGELOG="$CHANGELOG$(git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline --grep='fix:' | sed 's/^/- /' || echo 'None')\n\n"

          if [ -n "${{ github.event.inputs.release-notes }}" ]; then
            CHANGELOG="$CHANGELOG### Release Notes\n${{ github.event.inputs.release-notes }}\n\n"
          fi

          CHANGELOG="$CHANGELOG---\n**Full Changelog**: https://github.com/${{ github.repository }}/commits/v${{ needs.version.outputs.new_version }}"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  ##############################################################################
  # GITHUB RELEASE
  ##############################################################################
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, changelog]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body: ${{ needs.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ github.event.inputs.pre-release == 'true' }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  ##############################################################################
  # SEMANTIC RELEASE (automated)
  ##############################################################################
  semantic-release:
    name: Semantic Release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          branch: main
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
